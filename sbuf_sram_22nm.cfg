# installed cacti repository and built
# then ran ./cacti -infile sbuf_sram_22nm.cfg

# SBUF SRAM @ 32nm — minimal CACTI config
-size (bytes) 229376
-block size (bytes) 512
-associativity 1
-read-write port 1
-exclusive read port 0
-exclusive write port 0
-single ended read ports 0
-UCA bank count 1
-technology (u) 0.022
-page size (bits) 8192 # doesn't matter for RAM/cache
-burst length 8 # must be equal to internal prefetch width, but otherwise doesn't matter
-internal prefetch width 8 # must be equal to burst length, but otherwise doesn't matter
-Data array cell type - "itrs-hp"
-Data array peripheral type - "itrs-hp"
-Tag array cell type - "itrs-hp"
-Tag array peripheral type - "itrs-hp"
-output/input bus width 2048 # TODO: check this
-operating temperature (K) 360
-cache type "ram"
-tag size (b) "default"
-access mode (normal, sequential, fast) - "normal"
-design objective (weight delay, dynamic power, leakage power, cycle time, area) 0:0:0:100:0 # doesn't matter if ED^2 is used
-deviate (delay, dynamic power, leakage power, cycle time, area) 20:100000:100000:100000:100000 # doesn't matter if ED^2 is used
-Optimize ED or ED^2 (ED, ED^2, NONE): "ED^2"
-Cache model (NUCA, UCA) - "UCA"
-Wire signaling (fullswing, lowswing, default) - "default"
-Wire inside mat - "semi-global"
-Wire outside mat - "semi-global"
-Interconnect projection - "conservative"
# I/O + MemCAD stubs (required by CACTI driver, ignore output)
-dram_type "DDR3"
-bus_freq 800 MHz
-num_dq 72
-num_dqs 18
-num_ca 25
-num_clk 2
-num_mem_dq 2
-mem_data_width 8
-ron_value 34
-rtt_value 10000
-capacity 80
-num_bobs 1
-num_channels_per_bob 1
-first metric "Cost"
-second metric "Bandwidth"
-third metric "Energy"
-DIMM model "ALL"
-mirror_in_bob "F"
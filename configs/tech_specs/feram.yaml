# FeRAM — PZT / HZO ferroelectric (Micron HZO NVDRAM, Intel HZO 1T1R)
name: feram
class: feram
volatile: false
# Retention >10 years @ 55–85 °C
retention_s: null

# Micron HZO NVDRAM 0.45 Gb/mm² → 450 bits/µm²
cell_density_bits_per_um2: 450.0

access:
  # Read: 5–20 ns (HZO prototypes 5–7 ns) | Write: 2–20 ns (Intel HZO 2 ns pulse)
  read_latency_ns: 12.5
  write_latency_ns: 11.0
  # Read: ~100 fJ–1 pJ/bit | Write: ~100 fJ–10 pJ/bit
  read_energy_pJ_per_bit: 0.5
  write_energy_pJ_per_bit: 1.0

notes:
  relative_cost: moderate
  description: PZT / HZO ferroelectric capacitor
  bandwidth_source: "~34 GB/s NVDRAM LPDDR5-class; 1.6 GB/s @ 130 nm chain FeRAM"

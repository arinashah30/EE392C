name: trainium2_diff_mem_50sbuf_25hbm
description: StRAM takes 50% of nominal SBUF capacity per core; LtRAM takes 25% of nominal HBM capacity
instance: configs/instances/trn2_3xlarge.yaml

links_GBs:
  psum_sbuf: 2048
  # Literature macro limits on tier hops (Trainium DMA still caps at 368 GB/s)
  stram_sbuf: 128
  sbuf_stram: 800
  stram_ltram: 600
  ltram_hbm: 2900

levels:
  - id: psum
    enabled: true
    tech: psum_trainium2
    scope: per_core
    capacity_bytes: 2097152

  - id: sbuf
    enabled: true
    tech: sbuf_trainium2
    scope: per_core
    capacity_bytes: 29360128

  - id: stram
    enabled: true
    tech: edram_1t1c
    scope: per_core
    capacity_bytes: 0

  - id: ltram
    enabled: true
    tech: rram
    scope: per_chip
    capacity_bytes: 0

  - id: hbm
    enabled: true
    tech: hbm_trainium2
    scope: per_chip

kernel:
  wipe_levels_on_boundary: [psum, sbuf]

area_budget:
  enabled: true
  nominal_sbuf_bytes_per_core: 29360128
  nominal_hbm_gib_per_chip: 96
  stram_replaces_sbuf_fraction: 0.5
  ltram_replaces_hbm_fraction: 0.25

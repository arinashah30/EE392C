name: trainium2_diff_mem_25sbuf_50hbm
description: Capacity heavy — StRAM 25% of nominal SBUF per core; LtRAM 50% of nominal HBM
instance: configs/instances/trn2_3xlarge.yaml

interconnect:
  dma_bandwidth_GBs: 368
  on_chip_bandwidth_GBs: 10000
  level_domain:
    psum: on_chip
    sbuf: on_chip
    stram: on_chip
    ltram: off_chip
    hbm: off_chip

levels:
  - id: psum
    enabled: true
    tech: psum_trainium2
    scope: per_core
    capacity_bytes: 2097152

  - id: sbuf
    enabled: true
    tech: tsmc_n22_sram
    scope: per_core
    capacity_bytes: 29360128

  - id: stram
    enabled: true
    tech: edram_1t1c
    scope: per_core
    capacity_bytes: 0

  - id: ltram
    enabled: true
    tech: rram
    scope: per_chip
    capacity_bytes: 0

  - id: hbm
    enabled: true
    tech: hbm_trainium2
    scope: per_chip

kernel:
  wipe_levels_on_boundary: [psum, sbuf]

area_budget:
  enabled: true
  nominal_sbuf_bytes_per_core: 29360128
  nominal_hbm_gib_per_chip: 96
  stram_replaces_sbuf_fraction: 0.25
  ltram_replaces_hbm_fraction: 0.50

name: trainium2_diff_mem
description: PSUM -> SBUF -> StRAM (per core) -> LtRAM -> HBM
instance: configs/instances/trn2_3xlarge.yaml

links_GBs:
  psum_sbuf: 2048
  stram_sbuf: 128
  sbuf_stram: 800
  stram_ltram: 600
  ltram_hbm: 2900

levels:
  - id: psum
    enabled: true
    tech: psum_trainium2
    scope: per_core
    capacity_bytes: 2097152

  - id: sbuf
    enabled: true
    tech: sbuf_trainium2
    scope: per_core
    capacity_bytes: 29360128

  - id: stram
    enabled: true
    tech: edram_1t1c
    scope: per_core
    # ~128 MiB per chip / 4 active cores in profile (tune with area_budget)
    capacity_bytes: 33554432

  - id: ltram
    enabled: true
    tech: rram
    scope: per_chip
    capacity_bytes: 1073741824

  - id: hbm
    enabled: true
    tech: hbm_trainium2
    scope: per_chip

kernel:
  wipe_levels_on_boundary: [psum, sbuf]

area_budget:
  enabled: true
  nominal_sbuf_bytes_per_core: 29360128
  nominal_hbm_gib_per_chip: 96

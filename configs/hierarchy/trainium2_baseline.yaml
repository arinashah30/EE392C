name: trainium2_baseline
description: Trainium2 per-chip baseline (PSUM + SBUF + HBM only)
instance: configs/instances/trn2_3xlarge.yaml

# Bandwidth values are per NeuronCore (parallel across cores in the simulator).
interconnect:
  dma_bandwidth_GBs: 368
  on_chip_bandwidth_GBs: 10000
  level_domain:
    psum: on_chip
    sbuf: on_chip
    stram: on_chip
    ltram: off_chip
    hbm: off_chip

levels:
  - id: psum
    enabled: true
    tech: psum_trainium2
    scope: per_core
    capacity_bytes: 2097152

  - id: sbuf
    enabled: true
    tech: sbuf_trainium2
    scope: per_core
    capacity_bytes: 29360128

  - id: stram
    enabled: false
    tech: edram_1t1c
    scope: per_core
    capacity_bytes: 33554432

  - id: ltram
    enabled: false
    tech: rram
    scope: per_chip
    capacity_bytes: 1073741824

  - id: hbm
    enabled: true
    tech: hbm_trainium2
    scope: per_chip
  # capacity filled from instance hbm_gib_per_chip at load time

kernel:
  wipe_levels_on_boundary: [psum, sbuf]

area_budget:
  enabled: false
